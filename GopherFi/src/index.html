<!DOCTYPE html>
<html>
<head>
    <title>Live UMN Wi-Fi Signal Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #218838; }
        #map { height: 600px; width: 100%; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status { color: #555; font-size: 14px; }

        .legend {
            background: white;
            padding: 10px;
            line-height: 20px;
            color: #333;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend i {
            width: 14px;
            height: 14px;
            float: left;
            margin-right: 8px;
            margin-top: 3px;
            opacity: 0.9;
            border: 1px solid #777; /* Softer border for legend items */
            border-radius: 50%; 
        }
    </style>
</head>
<body>

    <h2> Live UMN Wi-Fi Signal Map</h2>
    
    <div class="controls">
        <span class="status" id="statusText">Waiting to load data...</span>
        <button onclick="fetchSheetData()">🔄 Refresh Map Data</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. SET UP THE UMN BOUNDED MAP ---
        var umnBounds = [
            [44.9650, -93.2550], // Southwest 
            [44.9880, -93.2100]  // Northeast
        ];

        var map = L.map('map', {
            center: [44.9740, -93.2277], // Center on Coffman Union
            zoom: 15,
            minZoom: 14,
            maxBounds: umnBounds,
            maxBoundsViscosity: 1.0
        });

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // --- ADD A CUSTOM LEGEND TO THE BOTTOM RIGHT ---
        var legend = L.control({position: 'bottomright'});

        // Updated High-Contrast Color Palette
        // We are stretching 8 colors across a 20 to 55 range
        var labels = ["55+", "50-54", "45-49", "40-44", "35-39", "30-34", "25-29", "< 25"];
        var colors = [
            "#1a9850", 
            "#66bd63", 
            "#a6d96a", 
            "#d9ef8b", 
            "#fee08b", 
            "#fdae61", 
            "#f46d43", 
            "#d73027"  
        ];

        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Signal Strength</strong><br>';
            for (var i = 0; i < labels.length; i++) {
                div.innerHTML += '<i style="background:' + colors[i] + '"></i> ' + labels[i] + '<br>';
            }
            return div;
        };

        legend.addTo(map);

        var markerLayer = L.layerGroup().addTo(map);

        // --- 2. FUNCTION TO FETCH AND PLOT GOOGLE SHEET DATA ---
        function fetchSheetData() {
            document.getElementById('statusText').innerText = "Fetching live data...";
            
            var sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvvJkw8dEf6RtQ4SPHWFcmDQkunyoQlfcSS_OhtgbPX651UP-1C6Dgonf1QKdcCvlIB19BHtVNxjoq/pub?output=csv";

            Papa.parse(sheetCsvUrl, {
                download: true,
                header: false, 
                complete: function(results) {
                    markerLayer.clearLayers();
                    var pointsPlotted = 0;

                    results.data.forEach(function(row) {
                        if (row.length >= 4) {
                            var dateStr = row[0];
                            var lat = parseFloat(row[1]);
                            var lon = parseFloat(row[2]);
                            var strength = parseInt(row[3]);

                            if (!isNaN(lat) && !isNaN(lon) && !isNaN(strength) && lat !== 0 && lon !== 0) {
                                
                                // Map strength to the new distinct Hex colors
                                var markerColor = "#d73027"; // Default Dark Red (for < 25 and -1)

                                if (strength >= 55) markerColor = "#1a9850";      // Dark Green
                                else if (strength >= 50) markerColor = "#66bd63"; // Medium Green
                                else if (strength >= 45) markerColor = "#a6d96a"; // Light Green
                                else if (strength >= 40) markerColor = "#d9ef8b"; // Yellow-Green
                                else if (strength >= 35) markerColor = "#fee08b"; // Yellow-Orange
                                else if (strength >= 30) markerColor = "#fdae61"; // Orange
                                else if (strength >= 25) markerColor = "#f46d43"; // Red-Orange

                                // Anything below 25 (including the -1 values) stays #d73027 (Dark Red)

                                // Create the circle marker with refined visuals
                                var marker = L.circleMarker([lat, lon], {
                                    radius: 6,           // Slightly smaller to reduce overlap
                                    fillColor: markerColor,
                                    color: "#333",       // Softer border color instead of harsh black
                                    weight: 0.5,         // Much thinner border 
                                    opacity: 1,
                                    fillOpacity: 0.85    // High enough to be vibrant, low enough to show stacks
                                });

                                marker.bindPopup("<b>Strength:</b> " + strength + "%<br><b>Logged:</b> " + dateStr);
                                marker.addTo(markerLayer);
                                pointsPlotted++;
                            }
                        }
                    });

                    document.getElementById('statusText').innerText = "Successfully mapped " + pointsPlotted + " data points!";
                },
                error: function() {
                    document.getElementById('statusText').innerText = "Error: Could not read Google Sheet. Check your CSV link.";
                }
            });
        }

        // --- 3. AUTO-LOAD DATA WHEN THE PAGE OPENS ---
        fetchSheetData();

    </script>
</body>
</html>
